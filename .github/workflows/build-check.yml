name: Build and TypeScript Check

# Trigger the workflow on push or pull request to any branch
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      name: Checkout repository
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
      
    - name: Run TypeScript check (npx tsc --noEmit)
      run: npx tsc --noEmit
      
    - name: Run build
      run: npm run build